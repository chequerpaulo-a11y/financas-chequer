<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Financas Chequer</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0d0f14;--surface:#161920;--surface2:#1e2230;--border:#2a2f40;--text:#e8eaf0;--text2:#8891a8;--green:#10b981;--red:#ef4444;--accent:#6366f1;--radius:14px;--font:'Sora',sans-serif;--mono:'JetBrains Mono',monospace}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--font);font-size:14px}
.app{max-width:480px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column}
header{background:linear-gradient(135deg,#1a1d2e,#0d0f14);padding:18px 18px 0;border-bottom:1px solid var(--border)}
.header-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.logo{font-size:18px;font-weight:700;letter-spacing:-.5px}.logo span{color:var(--accent)}
.mes-nav{display:flex;align-items:center;gap:8px}
.mes-nav button{background:var(--surface2);border:1px solid var(--border);color:var(--text2);width:30px;height:30px;border-radius:8px;cursor:pointer;font-size:16px}
.mes-nav button:hover{background:var(--accent);color:white}
#mes-label{font-size:12px;font-weight:500;color:var(--text2);min-width:120px;text-align:center;text-transform:capitalize}
.resumo{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:12px 18px}
.resumo-saldo{grid-column:1/-1;background:linear-gradient(135deg,var(--accent),#4f46e5);border-radius:var(--radius);padding:13px 16px;display:flex;justify-content:space-between;align-items:center}
.resumo-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:11px 13px}
.card-label{font-size:11px;font-weight:500;text-transform:uppercase;letter-spacing:.8px;color:var(--text2);margin-bottom:4px}
.valor-grande{font-family:var(--mono);font-size:18px;font-weight:500}
.valor-grande.pos{color:var(--green)}.valor-grande.neg{color:var(--red)}
.vr{font-family:var(--mono);font-size:15px;color:var(--green);font-weight:500}
.vd{font-family:var(--mono);font-size:15px;color:var(--red);font-weight:500}
.barra-container{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:11px 13px;grid-column:1/-1}
.barra-label{font-size:11px;color:var(--text2);margin-bottom:6px}
.barra-bg{background:var(--border);border-radius:99px;height:7px;overflow:hidden}
#barra-gasto{height:100%;border-radius:99px;transition:width .4s,background .4s}
.tabs{display:flex;border-bottom:1px solid var(--border);background:var(--surface)}
.tab-btn{flex:1;padding:11px;font-size:12px;font-weight:500;font-family:var(--font);color:var(--text2);background:none;border:none;cursor:pointer;border-bottom:2px solid transparent}
.tab-btn.ativa{color:var(--accent);border-bottom-color:var(--accent)}
.tab-content{display:none;flex:1;overflow-y:auto}.tab-content.ativa{display:block}
.filtros{display:flex;gap:7px;padding:9px 13px;background:var(--surface2)}
.filtros select{flex:1;background:var(--surface);border:1px solid var(--border);color:var(--text);border-radius:8px;padding:7px 9px;font-family:var(--font);font-size:12px}
.lista{padding:7px 13px 110px}
.item{display:flex;align-items:center;justify-content:space-between;padding:9px 11px;background:var(--surface);border:1px solid var(--border);border-radius:9px;margin-bottom:6px;gap:8px;border-left:3px solid}
.item.receita{border-left-color:var(--green)}.item.despesa{border-left-color:var(--red)}
.item-l{display:flex;align-items:center;gap:7px;flex:1;min-width:0}
.item-data{font-family:var(--mono);font-size:10px;color:var(--text2);white-space:nowrap}
.item-cat{font-size:12px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:150px}
.item-desc{font-size:10px;color:var(--text2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:150px}
.item-r{display:flex;align-items:center;gap:5px;flex-shrink:0}
.item-val{font-family:var(--mono);font-size:12px;font-weight:500;white-space:nowrap}
.item-val.receita{color:var(--green)}.item-val.despesa{color:var(--red)}
.btn-del{background:none;border:1px solid var(--border);color:var(--text2);cursor:pointer;font-size:10px;border-radius:4px;padding:2px 5px}
.vazio{text-align:center;color:var(--text2);padding:40px 20px;font-size:13px}
.cats-list{padding:7px 13px 110px}
.cat-row{background:var(--surface);border:1px solid var(--border);border-radius:9px;padding:10px 12px;margin-bottom:6px;cursor:pointer}
.cat-row:hover{border-color:var(--accent)}
.cat-nome{font-size:12px;font-weight:500;margin-bottom:5px}
.cat-nums{display:flex;align-items:center;gap:7px;margin-bottom:5px;flex-wrap:wrap}
.cat-r{font-family:var(--mono);font-size:12px}
.cat-o{font-family:var(--mono);font-size:11px;color:var(--text2)}
.cat-d{font-family:var(--mono);font-size:10px}
.cat-d.pos{color:var(--green)}.cat-d.neg{color:var(--red)}
.bw{background:var(--border);border-radius:99px;height:4px;overflow:hidden}
.bf{height:100%;border-radius:99px}
.hist-wrap{padding:13px 13px 110px}
.hist-titulo{font-size:11px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px}
.hist-card{background:var(--surface);border:1px solid var(--border);border-radius:9px;padding:11px;margin-bottom:7px;cursor:pointer}
.hist-card:hover{border-color:var(--accent)}
.hist-mes{font-size:12px;color:var(--text2);margin-bottom:8px;text-transform:capitalize}
.hist-vals{display:flex;gap:10px;flex-wrap:wrap;margin-top:6px}
.hv{font-family:var(--mono);font-size:10px}
.hv.r{color:var(--green)}.hv.d{color:var(--red)}
.hv.s{font-size:11px;font-weight:600}
.hv.sp{color:var(--green)}.hv.sn{color:var(--red)}
.fab{position:fixed;bottom:76px;right:18px;width:52px;height:52px;border-radius:14px;background:var(--accent);color:white;border:none;font-size:26px;cursor:pointer;box-shadow:0 8px 24px rgba(99,102,241,.4);display:flex;align-items:center;justify-content:center;z-index:100}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(4px);z-index:200;display:none;align-items:flex-end}
.modal-bg.open{display:flex}
.modal-sheet{background:var(--surface);border-radius:20px 20px 0 0;padding:20px 18px 38px;width:100%;max-height:90vh;overflow-y:auto}
.modal-hd{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.modal-hd h3{font-size:15px;font-weight:600}
.mc{background:var(--surface2);border:none;color:var(--text2);width:30px;height:30px;border-radius:8px;cursor:pointer}
.fg{margin-bottom:11px}
.fg label{display:block;font-size:10px;font-weight:500;text-transform:uppercase;color:var(--text2);margin-bottom:4px}
.fg input,.fg select{width:100%;background:var(--surface2);border:1px solid var(--border);color:var(--text);border-radius:9px;padding:9px 12px;font-family:var(--font);font-size:13px}
.fg input:focus,.fg select:focus{outline:none;border-color:var(--accent)}
.fr{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.btn-p{width:100%;background:var(--accent);color:white;border:none;border-radius:11px;padding:12px;font-family:var(--font);font-size:14px;font-weight:600;cursor:pointer;margin-top:5px}
.toast{position:fixed;bottom:140px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:9px 18px;border-radius:9px;font-size:12px;opacity:0;transition:all .3s;z-index:999;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.toast.ok{border-color:var(--green);color:var(--green)}.toast.err{border-color:var(--red);color:var(--red)}
.bnav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:var(--surface);border-top:1px solid var(--border);display:flex;z-index:100}
.ni{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:9px;cursor:pointer;color:var(--text2);font-size:10px;border:none;background:none;font-family:var(--font)}
.ni.ativa{color:var(--accent)}.ni span:first-child{font-size:17px}
.imp-banner{background:var(--surface2);border:2px solid var(--accent);border-radius:11px;padding:14px;margin:10px 13px 0;display:none;flex-direction:column;gap:8px}
.imp-banner p{font-size:12px;color:var(--text);line-height:1.5}
.btn-imp{background:var(--accent);color:white;border:none;border-radius:7px;padding:10px;font-size:13px;font-weight:600;cursor:pointer;font-family:var(--font);width:100%}
</style>
</head>
<body>
<div class="app">
<header>
  <div class="header-top">
    <div class="logo">Finan&#231;as <span>Chequer</span></div>
    <div class="mes-nav">
      <button id="btn-prev" type="button">&#8249;</button>
      <span id="mes-label">-</span>
      <button id="btn-next" type="button">&#8250;</button>
    </div>
  </div>
  <div class="resumo">
    <div class="resumo-saldo">
      <div>
        <div class="card-label" style="color:rgba(255,255,255,.6)">Saldo do m&#234;s</div>
        <div id="res-saldo" class="valor-grande">R$ 0,00</div>
      </div>
      <span style="font-size:24px;opacity:.4">&#128176;</span>
    </div>
    <div class="resumo-card"><div class="card-label">Receitas</div><div id="res-rec" class="vr">R$ 0,00</div></div>
    <div class="resumo-card"><div class="card-label">Despesas</div><div id="res-desp" class="vd">R$ 0,00</div></div>
    <div class="barra-container">
      <div class="barra-label">Comprometido da receita</div>
      <div class="barra-bg"><div id="barra-gasto" style="width:0%"></div></div>
    </div>
  </div>
  <div class="tabs">
    <button class="tab-btn ativa" id="tab-btn-lanc" type="button">Lan&#231;amentos</button>
    <button class="tab-btn" id="tab-btn-cats" type="button">Or&#231;amento</button>
    <button class="tab-btn" id="tab-btn-hist" type="button">Hist&#243;rico</button>
  </div>
</header>
<div class="tab-content ativa" id="tab-lanc">
  <div class="imp-banner" id="imp-banner">
    <p>&#128202; Dados da planilha prontos. Clique para importar Set/2025 a Abr/2026.</p>
    <button class="btn-imp" id="btn-importar" type="button">Importar dados da planilha</button>
  </div>
  <div class="filtros">
    <select id="ftipo"><option value="todos">Todos</option><option value="receita">Receitas</option><option value="despesa">Despesas</option></select>
    <select id="fcat"><option value="">Categoria</option></select>
  </div>
  <div class="lista" id="lista"><div class="vazio">Carregando...</div></div>
</div>
<div class="tab-content" id="tab-cats"><div class="cats-list" id="tcats"><div class="vazio">Nenhuma despesa</div></div></div>
<div class="tab-content" id="tab-hist"><div class="hist-wrap" id="thist"></div></div>
<button class="fab" id="btn-novo" type="button">+</button>
<nav class="bnav">
  <button class="ni ativa" id="ni-lanc" type="button"><span>&#128203;</span><span>Lan&#231;amentos</span></button>
  <button class="ni" id="ni-cats" type="button"><span>&#128202;</span><span>Or&#231;amento</span></button>
  <button class="ni" id="ni-hist" type="button"><span>&#128200;</span><span>Hist&#243;rico</span></button>
</nav>
</div>
<div class="modal-bg" id="m-lanc">
  <div class="modal-sheet">
    <div class="modal-hd"><h3>Novo Lan&#231;amento</h3><button class="mc" id="mc-lanc" type="button">&#10005;</button></div>
    <div class="fg"><label>Tipo</label><select id="inp-tipo"><option value="despesa">Despesa</option><option value="receita">Receita</option></select></div>
    <div class="fr">
      <div class="fg"><label>Data</label><input type="date" id="inp-data"></div>
      <div class="fg"><label>Valor (R$)</label><input type="number" id="inp-valor" placeholder="0,00" step="0.01" min="0"></div>
    </div>
    <div class="fg"><label>Categoria</label><select id="inp-cat"><option value="">Selecione...</option></select></div>
    <div class="fg"><label>Descri&#231;&#227;o</label><input type="text" id="inp-desc" placeholder="Ex: Supermercado Vilela"></div>
    <div class="fg"><label>Conta</label>
      <select id="inp-conta">
        <option value="">-</option><option>Nubank Paulo</option><option>Nubank Mariana</option>
        <option>BB Paulo</option><option>BB Mariana</option><option>Sicoob Paulo</option>
        <option>Sicoob Mariana</option><option>Mercado Pago Paulo</option><option>Mercado Pago Mariana</option>
        <option>Carteira Paulo</option><option>Carteira Mariana</option>
      </select>
    </div>
    <button class="btn-p" id="btn-salvar-lanc" type="button">Salvar</button>
  </div>
</div>
<div class="modal-bg" id="m-orc">
  <div class="modal-sheet">
    <div class="modal-hd"><h3>Or&#231;amento</h3><button class="mc" id="mc-orc" type="button">&#10005;</button></div>
    <div class="fg"><label>Categoria</label><input type="text" id="orc-label" readonly style="opacity:.6"><input type="hidden" id="orc-cat"></div>
    <div class="fg"><label>Valor planejado (R$)</label><input type="number" id="orc-val" placeholder="0,00" step="0.01"></div>
    <button class="btn-p" id="btn-salvar-orc" type="button">Salvar</button>
  </div>
</div>
<div class="toast" id="toast"></div>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>

<script>
(function(){
var PLANILHA = JSON.parse(atob(document.getElementById('dados-b64').textContent));

var CD = ["SUPERMERCADO","PADARIA / LANCHES","ALUGUEL","CONDOMÍNIO","LUZ","IPTU","INTERNET","FARMÁCIA / MEDICAMENTOS","FARMÁCIA / OUTROS PRODUTOS","GASOLINA / CARRO","EMPREGADOS","ADIANTAMENTO EMPREGADOS","SAÚDE FAMILIAR","ACADEMIA","SUPLEMENTOS","RESTAURANTES / SAÍDAS","PRODUTOS DE BELEZA","COMPRAS CASA À VISTA","COMPRAS CASA PARCELADO","COMPRAS VESTUÁRIO À VISTA","COMPRAS VESTUÁRIO PARCELADO","PRESENTES","VIAGENS","DOAÇÕES","FESTAS","BANCOS","CUIDADOS PESSOAIS","CRA","CLUBE","ASSINATURAS DE LAZER","DÍVIDAS","CURSOS E LIVROS","LAVANDERIA / MANUTENÇÃO CASA","OUTROS","INVESTIMENTOS / POUPANÇA","Contabilidade Paulo","Impostos Paulo","Marcos Paulo","Marketing Paulo","Assinaturas Paulo","Compras Paulo","Vida de Mentor Paulo","Outros Paulo"];
var CR = ["RENDA MARIANA","RENDA PAULO"];

var db, lancs=[], orcs={}, mesSel;
var fmt = function(v){return v.toLocaleString('pt-BR',{style:'currency',currency:'BRL'});};
var mesLbl = function(m){var p=m.split('-');return new Date(parseInt(p[0]),parseInt(p[1])-1,1).toLocaleDateString('pt-BR',{month:'long',year:'numeric'});};

firebase.initializeApp({
  apiKey:"AIzaSyAQR2dpiRIR4-9I5wEHqwMli0MGRN9NmS4",
  authDomain:"financas-chequer.firebaseapp.com",
  databaseURL:"https://financas-chequer-default-rtdb.firebaseio.com",
  projectId:"financas-chequer",
  storageBucket:"financas-chequer.firebasestorage.app",
  messagingSenderId:"692974669516",
  appId:"1:692974669516:web:900ac80b586c9d3d98bc69"
});
db = firebase.database();

var d = new Date();
mesSel = d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,'0');

function init(){
  // Filtro categorias
  var sf = document.getElementById('fcat');
  CD.forEach(function(c){var o=document.createElement('option');o.value=c;o.textContent=c;sf.appendChild(o);});
  CR.forEach(function(c){var o=document.createElement('option');o.value=c;o.textContent=c;sf.appendChild(o);});
  updCats();

  // Eventos - sem onclick inline
  document.getElementById('btn-prev').addEventListener('click',function(){mudarMes(-1);});
  document.getElementById('btn-next').addEventListener('click',function(){mudarMes(1);});
  document.getElementById('btn-novo').addEventListener('click',abrirModal);
  document.getElementById('btn-salvar-lanc').addEventListener('click',addLanc);
  document.getElementById('btn-salvar-orc').addEventListener('click',saveOrc);
  document.getElementById('btn-importar').addEventListener('click',importarDados);
  document.getElementById('mc-lanc').addEventListener('click',function(){closeM('m-lanc');});
  document.getElementById('mc-orc').addEventListener('click',function(){closeM('m-orc');});
  document.getElementById('m-lanc').addEventListener('click',function(e){if(e.target===this)closeM('m-lanc');});
  document.getElementById('m-orc').addEventListener('click',function(e){if(e.target===this)closeM('m-orc');});
  document.getElementById('tab-btn-lanc').addEventListener('click',function(){trocarTab('lanc');});
  document.getElementById('tab-btn-cats').addEventListener('click',function(){trocarTab('cats');});
  document.getElementById('tab-btn-hist').addEventListener('click',function(){trocarTab('hist');});
  document.getElementById('ni-lanc').addEventListener('click',function(){trocarTab('lanc');});
  document.getElementById('ni-cats').addEventListener('click',function(){trocarTab('cats');});
  document.getElementById('ni-hist').addEventListener('click',function(){trocarTab('hist');});
  document.getElementById('ftipo').addEventListener('change',renderLanc);
  document.getElementById('fcat').addEventListener('change',renderLanc);
  document.getElementById('inp-tipo').addEventListener('change',updCats);

  document.getElementById('imp-banner').style.display='flex';
  assinar(mesSel);
}

function assinar(mes){
  db.ref('lancamentos/'+mes).on('value',function(s){
    var val=s.val()||{};
    lancs=Object.keys(val).map(function(id){var l=val[id];l.id=id;return l;});
    lancs.sort(function(a,b){return b.data.localeCompare(a.data);});
    renderAll();
  });
  db.ref('orcamentos2/'+mes).on('value',function(s){
    var raw=s.val()||{};orcs={};Object.keys(raw).forEach(function(k){if(raw[k]&&raw[k].cat)orcs[raw[k].cat]=raw[k].val;else orcs[k]=raw[k];});
    renderAll();
  });
}

function renderAll(){rRes();renderLanc();renderCats();}

function rRes(){
  var rec=0,desp=0;
  lancs.forEach(function(l){if(l.tipo==='receita')rec+=l.valor;else desp+=l.valor;});
  var s=rec-desp;
  document.getElementById('res-rec').textContent=fmt(rec);
  document.getElementById('res-desp').textContent=fmt(desp);
  document.getElementById('res-saldo').textContent=fmt(s);
  document.getElementById('res-saldo').className='valor-grande '+(s>=0?'pos':'neg');
  var pct=rec>0?Math.min(100,(desp/rec)*100):0;
  var b=document.getElementById('barra-gasto');
  b.style.width=pct+'%';
  b.style.background=pct>90?'#ef4444':pct>70?'#f59e0b':'#10b981';
  document.getElementById('mes-label').textContent=mesLbl(mesSel);
}

function renderLanc(){
  var el=document.getElementById('lista');
  var ft=document.getElementById('ftipo').value;
  var fc=document.getElementById('fcat').value;
  var d=lancs.filter(function(l){
    if(ft!=='todos'&&l.tipo!==ft)return false;
    if(fc&&l.categoria!==fc)return false;
    return true;
  });
  if(!d.length){el.innerHTML='<div class="vazio">Nenhum lançamento</div>';return;}
  el.innerHTML='';
  d.forEach(function(l){
    var div=document.createElement('div');
    div.className='item '+l.tipo;
    var data=l.data.split('-').reverse().join('/');
    var sinal=l.tipo==='receita'?'+':'-';
    var desc=l.descricao?'<div class="item-desc">'+l.descricao+'</div>':'';
    div.innerHTML='<div class="item-l"><span class="item-data">'+data+'</span><div><div class="item-cat">'+l.categoria+'</div>'+desc+'</div></div><div class="item-r"><span class="item-val '+l.tipo+'">'+sinal+' '+fmt(l.valor)+'</span></div>';
    if(l.id){
      var btn=document.createElement('button');
      btn.className='btn-del';btn.textContent='x';btn.type='button';
      btn.dataset.id=l.id;
      btn.addEventListener('click',function(){delLanc(this.dataset.id);});
      div.querySelector('.item-r').appendChild(btn);
    }
    el.appendChild(div);
  });
}

function delLanc(id){
  if(!confirm('Excluir?'))return;
  db.ref('lancamentos/'+mesSel+'/'+id).remove();
  toast('Excluído','ok');
}

function renderCats(){
  var el=document.getElementById('tcats');
  var g={};
  lancs.filter(function(l){return l.tipo==='despesa';}).forEach(function(l){g[l.categoria]=(g[l.categoria]||0)+l.valor;});
  var all={};
  Object.keys(g).forEach(function(k){all[k]=1;});
  Object.keys(orcs).forEach(function(k){all[k]=1;});
  var keys=Object.keys(all).sort();
  if(!keys.length){el.innerHTML='<div class="vazio">Nenhuma despesa</div>';return;}
  el.innerHTML='';
  keys.forEach(function(cat){
    var r=g[cat]||0,o=orcs[cat]||0,diff=o-r;
    var pct=o>0?Math.min(100,(r/o)*100):0;
    var bc=pct>90?'#ef4444':pct>70?'#f59e0b':'#10b981';
    var div=document.createElement('div');
    div.className='cat-row';
    var inner='<div class="cat-nome">'+cat+'</div><div class="cat-nums"><span class="cat-r">'+fmt(r)+'</span>';
    if(o>0){var seta=diff>=0?'&#9650;':'&#9660;';inner+='<span class="cat-o">/ '+fmt(o)+'</span><span class="cat-d '+(diff>=0?'pos':'neg')+'">'+seta+' '+fmt(Math.abs(diff))+'</span>';}
    inner+='</div>';
    if(o>0)inner+='<div class="bw"><div class="bf" style="width:'+pct+'%;background:'+bc+'"></div></div>';
    div.innerHTML=inner;
    div.addEventListener('click',function(){openOrc(cat,o);});
    el.appendChild(div);
  });
}

function openOrc(cat,val){
  document.getElementById('orc-cat').value=cat;
  document.getElementById('orc-label').value=cat;
  document.getElementById('orc-val').value=val||'';
  document.getElementById('m-orc').classList.add('open');
}

function renderHist(){
  var el=document.getElementById('thist');
  var meses=Object.keys(PLANILHA).sort();
  var max=1;
  meses.forEach(function(m){
    var p=PLANILHA[m],r=0,d=0;
    p.lancamentos.forEach(function(l){if(l.tipo==='receita')r+=l.valor;else d+=l.valor;});
    if(r>max)max=r;if(d>max)max=d;
  });
  el.innerHTML='<div class="hist-titulo">Histórico — Set/2025 a Abr/2026</div>';
  meses.forEach(function(m){
    var p=PLANILHA[m],rec=0,desp=0;
    p.lancamentos.forEach(function(l){if(l.tipo==='receita')rec+=l.valor;else desp+=l.valor;});
    var saldo=rec-desp,hR=(rec/max)*50,hD=(desp/max)*50;
    var card=document.createElement('div');card.className='hist-card';
    card.innerHTML='<div class="hist-mes">'+mesLbl(m)+'</div><div style="display:flex;gap:8px;align-items:flex-end;height:50px"><div style="height:'+hR.toFixed(0)+'px;width:44%;background:#10b981;opacity:.8;border-radius:4px 4px 0 0"></div><div style="height:'+hD.toFixed(0)+'px;width:44%;background:#ef4444;opacity:.8;border-radius:4px 4px 0 0"></div></div><div class="hist-vals"><span class="hv r">+'+fmt(rec)+'</span><span class="hv d">-'+fmt(desp)+'</span><span class="hv s '+(saldo>=0?'sp':'sn')+'">'+fmt(saldo)+'</span></div>';
    card.addEventListener('click',function(){irMes(m);});
    el.appendChild(card);
  });
}

function irMes(m){mesSel=m;trocarTab('lanc');assinar(m);}

function addLanc(){
  var data=document.getElementById('inp-data').value;
  var tipo=document.getElementById('inp-tipo').value;
  var cat=document.getElementById('inp-cat').value;
  var val=parseFloat(document.getElementById('inp-valor').value);
  var desc=document.getElementById('inp-desc').value.trim();
  var conta=document.getElementById('inp-conta').value;
  if(!data||!cat||isNaN(val)||val<=0){toast('Preencha os campos obrigatórios','err');return;}
  db.ref('lancamentos/'+mesSel).push({data:data,tipo:tipo,categoria:cat,valor:val,descricao:desc,conta:conta});
  closeM('m-lanc');toast('Lançamento adicionado!','ok');
}

function saveOrc(){
  var cat=document.getElementById('orc-cat').value;
  var val=parseFloat(document.getElementById('orc-val').value);
  if(!cat||isNaN(val))return;
  var safeKey=cat.replace(/[.#$\/\[\]]/g,'_');
  var upd={};upd[safeKey]={cat:cat,val:val};
  db.ref('orcamentos2/'+mesSel).update(upd);
  closeM('m-orc');toast('Orcamento salvo!','ok');
}

function importarDados(){
  if(!confirm('Importar 1.209 lancamentos de Set/2025 a Abr/2026?'))return;
  document.getElementById('imp-banner').style.display='none';
  toast('Importando...','ok');
  var meses=Object.keys(PLANILHA),i=0;
  function proxMes(){
    if(i>=meses.length){toast('Importacao completa!','ok');assinar(mesSel);return;}
    var mes=meses[i++],lancsArr=PLANILHA[mes].lancamentos,j=0;
    function proxLanc(){
      if(j>=lancsArr.length){proxMes();return;}
      db.ref('lancamentos/'+mes).push(lancsArr[j++]).then(proxLanc);
    }
    proxLanc();
  }
  proxMes();
}

function abrirModal(){
  document.getElementById('inp-tipo').value='despesa';
  updCats();
  document.getElementById('inp-data').value=new Date().toISOString().split('T')[0];
  document.getElementById('inp-valor').value='';
  document.getElementById('inp-desc').value='';
  document.getElementById('m-lanc').classList.add('open');
}

function closeM(id){document.getElementById(id).classList.remove('open');}

function updCats(){
  var t=document.getElementById('inp-tipo').value;
  var s=document.getElementById('inp-cat');
  var cats=t==='receita'?CR:CD;
  s.innerHTML='<option value="">Selecione...</option>';
  cats.forEach(function(c){var o=document.createElement('option');o.textContent=c;s.appendChild(o);});
}

function trocarTab(tab){
  ['lanc','cats','hist'].forEach(function(t){
    document.getElementById('tab-btn-'+t).classList.remove('ativa');
    document.getElementById('tab-'+t).classList.remove('ativa');
    document.getElementById('ni-'+t).classList.remove('ativa');
  });
  document.getElementById('tab-btn-'+tab).classList.add('ativa');
  document.getElementById('tab-'+tab).classList.add('ativa');
  document.getElementById('ni-'+tab).classList.add('ativa');
  if(tab==='hist')renderHist();
}

function mudarMes(delta){
  var p=mesSel.split('-');
  var dt=new Date(parseInt(p[0]),parseInt(p[1])-1+delta,1);
  mesSel=dt.getFullYear()+'-'+String(dt.getMonth()+1).padStart(2,'0');
  assinar(mesSel);
}

function toast(msg,tipo){
  var t=document.getElementById('toast');
  t.textContent=msg;t.className='toast show '+(tipo||'');
  setTimeout(function(){t.className='toast';},3000);
}

init();
})();
</script>
